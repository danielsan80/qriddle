<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Puzzle Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Serif+Display&display=swap');

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --paper: #f8f5ed;
        --ink: #1a1a1a;
        --grid: #d4cbb8;
        --accent: #c1502e;
        --shadow: rgba(0, 0, 0, 0.15);
      }

      body {
        font-family: 'Courier Prime', monospace;
        background: linear-gradient(135deg, #e8e4d9 0%, #f8f5ed 100%);
        min-height: 100vh;
        padding: 2rem;
        color: var(--ink);
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        background: var(--paper);
        box-shadow: 0 20px 60px var(--shadow);
        border: 2px solid var(--ink);
        position: relative;
      }

      .container::before {
        content: '';
        position: absolute;
        top: -8px;
        left: -8px;
        right: -8px;
        bottom: -8px;
        background: var(--ink);
        z-index: -1;
      }

      header {
        background: var(--ink);
        color: var(--paper);
        padding: 2rem 3rem;
        border-bottom: 4px solid var(--accent);
      }

      h1 {
        font-family: 'DM Serif Display', serif;
        font-size: 3rem;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        font-size: 1rem;
        opacity: 0.8;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      main {
        padding: 3rem;
      }

      .controls {
        background: white;
        border: 2px solid var(--ink);
        padding: 2rem;
        margin-bottom: 3rem;
        box-shadow: 8px 8px 0 var(--grid);
      }

      .input-group {
        margin-bottom: 1.5rem;
      }

      label {
        display: block;
        font-weight: 700;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
      }

      input[type='text'],
      input[type='number'],
      select {
        width: 100%;
        padding: 0.75rem;
        border: 2px solid var(--ink);
        background: var(--paper);
        font-family: 'Courier Prime', monospace;
        font-size: 1rem;
        transition: all 0.2s;
      }

      input:focus,
      select:focus {
        outline: none;
        box-shadow: 0 0 0 4px var(--accent);
      }

      button {
        background: var(--accent);
        color: white;
        border: 2px solid var(--ink);
        padding: 1rem 2.5rem;
        font-family: 'Courier Prime', monospace;
        font-weight: 700;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 4px 4px 0 var(--ink);
      }

      button:hover {
        transform: translate(2px, 2px);
        box-shadow: 2px 2px 0 var(--ink);
      }

      button:active {
        transform: translate(4px, 4px);
        box-shadow: 0 0 0 var(--ink);
      }

      .workspace {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
      }

      .panel {
        background: white;
        border: 2px solid var(--ink);
        padding: 2rem;
      }

      .panel h2 {
        font-family: 'DM Serif Display', serif;
        font-size: 1.5rem;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--grid);
      }

      .canvas-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 400px;
        background: var(--paper);
        border: 2px dashed var(--grid);
        padding: 1rem;
      }

      canvas {
        border: 2px solid var(--ink);
        box-shadow: 4px 4px 0 var(--grid);
        image-rendering: pixelated;
      }

      .stats {
        margin-top: 1.5rem;
        padding: 1rem;
        background: var(--paper);
        border-left: 4px solid var(--accent);
        font-size: 0.9rem;
      }

      .stats-item {
        margin: 0.5rem 0;
      }

      .stats-label {
        font-weight: 700;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
      }

      #qrcode {
        display: none;
      }

      .loading {
        text-align: center;
        padding: 2rem;
        color: var(--accent);
        font-weight: 700;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .panel {
        animation: fadeIn 0.4s ease-out;
      }

      .workspace .panel:nth-child(2) {
        animation-delay: 0.1s;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>QR Puzzle Generator</h1>
        <div class="subtitle">Generatore di Enigmi QR Code</div>
      </header>

      <main>
        <div class="controls">
          <div class="input-group">
            <label for="qrText">Testo o URL per QR Code</label>
            <input
              type="text"
              id="qrText"
              value="https://example.com"
              placeholder="Inserisci testo o URL..."
            />
          </div>

          <button onclick="generatePuzzle()">Genera Puzzle</button>
        </div>

        <div id="qrcode"></div>

        <div class="workspace" id="workspace" style="display: none">
          <div class="panel">
            <h2>QR Code Originale (Griglia A)</h2>
            <div class="canvas-container">
              <canvas id="qrCanvas"></canvas>
            </div>
            <div class="stats">
              <div class="stats-item">
                <span class="stats-label">Dimensione:</span>
                <span id="qrSize">-</span>
              </div>
              <div class="stats-item">
                <span class="stats-label">Moduli Neri:</span>
                <span id="blackModules">-</span>
              </div>
            </div>
          </div>

          <div class="panel">
            <h2>Puzzle Generato (Griglia B)</h2>
            <div class="canvas-container">
              <canvas id="puzzleCanvas"></canvas>
            </div>
            <div class="stats">
              <div class="stats-item">
                <span class="stats-label">Aree Totali:</span>
                <span id="totalAreas">-</span>
              </div>
              <div class="stats-item">
                <span class="stats-label">Aree Nere:</span>
                <span id="blackAreas">-</span>
              </div>
              <div class="stats-item">
                <span class="stats-label">Dimensione Media Area:</span>
                <span id="avgAreaSize">-</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script>
      let qrMatrix = null;

      function generatePuzzle() {
        const text = document.getElementById('qrText').value;

        if (!text) {
          alert('Inserisci un testo o URL!');
          return;
        }

        // Clear previous QR code
        document.getElementById('qrcode').innerHTML = '';

        // Generate QR code
        const qr = new QRCode(document.getElementById('qrcode'), {
          text: text,
          width: 256,
          height: 256,
          correctLevel: QRCode.CorrectLevel.M,
        });

        // Wait for QR code to render
        setTimeout(() => {
          extractQRMatrix();
          renderQRCanvas();
          generateAndRenderPuzzle();
          document.getElementById('workspace').style.display = 'grid';
        }, 100);
      }

      function extractQRMatrix() {
        const img = document.querySelector('#qrcode img');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        // Find the actual QR code size (excluding white borders)
        let minX = canvas.width,
          minY = canvas.height,
          maxX = 0,
          maxY = 0;

        for (let y = 0; y < canvas.height; y++) {
          for (let x = 0; x < canvas.width; x++) {
            const idx = (y * canvas.width + x) * 4;
            const brightness = data[idx]; // R value
            if (brightness < 128) {
              // Black pixel
              minX = Math.min(minX, x);
              minY = Math.min(minY, y);
              maxX = Math.max(maxX, x);
              maxY = Math.max(maxY, y);
            }
          }
        }

        const qrWidth = maxX - minX + 1;
        const qrHeight = maxY - minY + 1;
        const moduleSize = Math.round(qrWidth / Math.sqrt(qrWidth)); // Estimate module count
        const actualModuleSize = qrWidth / moduleSize;

        qrMatrix = [];
        let blackCount = 0;

        for (let row = 0; row < moduleSize; row++) {
          qrMatrix[row] = [];
          for (let col = 0; col < moduleSize; col++) {
            const centerX = Math.floor(minX + (col + 0.5) * actualModuleSize);
            const centerY = Math.floor(minY + (row + 0.5) * actualModuleSize);
            const idx = (centerY * canvas.width + centerX) * 4;
            const isBlack = data[idx] < 128;
            qrMatrix[row][col] = isBlack ? 1 : 0;
            if (isBlack) blackCount++;
          }
        }

        document.getElementById('qrSize').textContent =
          `${moduleSize} × ${moduleSize}`;
        document.getElementById('blackModules').textContent = blackCount;
      }

      function renderQRCanvas() {
        const canvas = document.getElementById('qrCanvas');
        const ctx = canvas.getContext('2d');
        const size = qrMatrix.length;
        const cellSize = 12;

        canvas.width = size * cellSize;
        canvas.height = size * cellSize;

        for (let row = 0; row < size; row++) {
          for (let col = 0; col < size; col++) {
            ctx.fillStyle = qrMatrix[row][col] ? '#1a1a1a' : '#ffffff';
            ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
          }
        }
      }

      function generateAndRenderPuzzle() {
        const size = qrMatrix.length;
        const highResSize = size * 2; // Griglia B è 2x la risoluzione di A

        // Create high-res grid
        const highResGrid = [];
        for (let row = 0; row < highResSize; row++) {
          highResGrid[row] = [];
          for (let col = 0; col < highResSize; col++) {
            const origRow = Math.floor(row / 2);
            const origCol = Math.floor(col / 2);
            highResGrid[row][col] = qrMatrix[origRow][origCol];
          }
        }

        // Generate maze-like borders using serpentine paths
        const borders = generateMazeBorders(highResGrid);
        const areas = findAreas(highResGrid, borders);

        // Render puzzle
        renderPuzzle(highResGrid, borders, areas);

        // Update stats
        const blackAreas = areas.filter((a) => a.isBlack).length;
        const totalCells = areas.reduce((sum, a) => sum + a.cells.length, 0);
        const smallAreas = areas.filter((a) => a.cells.length <= 4).length;
        const tinyAreas = areas.filter((a) => a.cells.length <= 3).length;
        const minSize = Math.min(...areas.map((a) => a.cells.length));
        const maxSize = Math.max(...areas.map((a) => a.cells.length));

        document.getElementById('totalAreas').textContent = areas.length;
        document.getElementById('blackAreas').textContent = blackAreas;
        document.getElementById('avgAreaSize').textContent =
          `${(totalCells / areas.length).toFixed(1)} celle (min: ${minSize}, max: ${maxSize}, ≤4: ${smallAreas}, ≤3: ${tinyAreas})`;
      }

      function generateMazeBorders(grid) {
        const rows = grid.length;
        const cols = grid[0].length;

        // Initialize border arrays
        const horizontal = Array(rows)
          .fill(null)
          .map(() => Array(cols).fill(false));
        const vertical = Array(rows)
          .fill(null)
          .map(() => Array(cols).fill(false));

        // Add outer borders
        for (let col = 0; col < cols; col++) {
          horizontal[rows - 1][col] = true; // bottom
        }
        for (let row = 0; row < rows; row++) {
          vertical[row][cols - 1] = true; // right
        }

        // PHASE 1: Divide by color (black vs white)
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const current = grid[row][col];

            // Check right neighbor
            if (col < cols - 1 && grid[row][col + 1] !== current) {
              vertical[row][col] = true;
            }

            // Check bottom neighbor
            if (row < rows - 1 && grid[row + 1][col] !== current) {
              horizontal[row][col] = true;
            }
          }
        }

        // PHASE 2: Add internal walls to create serpentine paths
        // For each macro-area, add walls using spanning tree + extra edges
        const visited = Array(rows)
          .fill(null)
          .map(() => Array(cols).fill(false));

        function findMacroArea(startRow, startCol) {
          const color = grid[startRow][startCol];
          const cells = [];
          const queue = [[startRow, startCol]];
          visited[startRow][startCol] = true;

          while (queue.length > 0) {
            const [row, col] = queue.shift();
            cells.push([row, col]);

            const neighbors = [
              [row - 1, col],
              [row + 1, col],
              [row, col - 1],
              [row, col + 1],
            ];

            for (const [nr, nc] of neighbors) {
              if (
                nr >= 0 &&
                nr < rows &&
                nc >= 0 &&
                nc < cols &&
                !visited[nr][nc] &&
                grid[nr][nc] === color
              ) {
                visited[nr][nc] = true;
                queue.push([nr, nc]);
              }
            }
          }

          return cells;
        }

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            if (!visited[row][col]) {
              const macroArea = findMacroArea(row, col);
              if (macroArea.length > 4) {
                addSerpentineWalls(
                  macroArea,
                  horizontal,
                  vertical,
                  rows,
                  cols,
                  grid,
                );
              }
            }
          }
        }

        return { horizontal, vertical };
      }

      /**
       * Add internal walls to create serpentine path WITHOUT creating 2x2 blocks
       * Key: Use spanning tree, then add 30% extra edges for loops, checking 2x2 at each step
       */
      function addSerpentineWalls(
        cells,
        horizontal,
        vertical,
        rows,
        cols,
        grid,
      ) {
        if (cells.length <= 4) return;

        const cellSet = new Set(cells.map(([r, c]) => `${r},${c}`));

        // Build adjacency list
        const adjList = new Map();
        for (const [row, col] of cells) {
          const key = `${row},${col}`;
          const neighbors = [];

          if (row > 0 && cellSet.has(`${row - 1},${col}`))
            neighbors.push([row - 1, col]);
          if (row < rows - 1 && cellSet.has(`${row + 1},${col}`))
            neighbors.push([row + 1, col]);
          if (col > 0 && cellSet.has(`${row},${col - 1}`))
            neighbors.push([row, col - 1]);
          if (col < cols - 1 && cellSet.has(`${row},${col + 1}`))
            neighbors.push([row, col + 1]);

          adjList.set(key, neighbors);
        }

        // Create spanning tree (DFS) - these edges will NOT have walls
        const treeEdges = new Set();
        const visitedDFS = new Set();
        const startCell = cells[Math.floor(Math.random() * cells.length)];
        const stack = [startCell];
        visitedDFS.add(`${startCell[0]},${startCell[1]}`);

        while (stack.length > 0) {
          const [row, col] = stack[stack.length - 1];
          const key = `${row},${col}`;
          const neighbors = adjList.get(key) || [];

          // Shuffle neighbors for randomness
          const shuffled = [...neighbors].sort(() => Math.random() - 0.5);

          let found = false;
          for (const [nr, nc] of shuffled) {
            const nKey = `${nr},${nc}`;
            if (!visitedDFS.has(nKey)) {
              visitedDFS.add(nKey);
              stack.push([nr, nc]);

              // Mark edge as part of tree
              const edge = getEdgeKey(row, col, nr, nc);
              treeEdges.add(edge);

              found = true;
              break;
            }
          }

          if (!found) {
            stack.pop();
          }
        }

        // Collect all edges in the macro-area
        const allEdges = [];
        for (const [row, col] of cells) {
          const neighbors = adjList.get(`${row},${col}`) || [];
          for (const [nr, nc] of neighbors) {
            // Only process each edge once
            if (nr < row || (nr === row && nc < col)) continue;

            const edge = getEdgeKey(row, col, nr, nc);
            if (!treeEdges.has(edge)) {
              allEdges.push({ row, col, nr, nc, edge });
            }
          }
        }

        // Add walls to non-tree edges, but keep 30% for loops
        const shuffledEdges = allEdges.sort(() => Math.random() - 0.5);

        for (const { row, col, nr, nc } of shuffledEdges) {
          // 70% chance to add wall
          if (Math.random() < 0.7) {
            // Try adding the wall
            if (nr === row + 1 && nc === col) {
              // Neighbor below
              horizontal[row][col] = true;
            } else if (nc === col + 1 && nr === row) {
              // Neighbor to right
              vertical[row][col] = true;
            }

            // Check if this created a 2x2 block
            if (
              has2x2BlockNearEdge(
                row,
                col,
                nr,
                nc,
                horizontal,
                vertical,
                rows,
                cols,
                cellSet,
              )
            ) {
              // Undo - remove the wall
              if (nr === row + 1 && nc === col) {
                horizontal[row][col] = false;
              } else if (nc === col + 1 && nr === row) {
                vertical[row][col] = false;
              }
            }
          }
        }
      }

      /**
       * Get normalized edge key for two adjacent cells
       */
      function getEdgeKey(r1, c1, r2, c2) {
        const cells = [
          [r1, c1],
          [r2, c2],
        ].sort((a, b) => (a[0] !== b[0] ? a[0] - b[0] : a[1] - b[1]));
        return `${cells[0][0]},${cells[0][1]}-${cells[1][0]},${cells[1][1]}`;
      }

      /**
       * Check if there's a 2x2 block near the given edge
       * Only checks the 2x2 configurations that include this edge
       */
      function has2x2BlockNearEdge(
        r1,
        c1,
        r2,
        c2,
        horizontal,
        vertical,
        rows,
        cols,
        cellSet,
      ) {
        // Get all possible 2x2 blocks that include both cells
        const blocks = [];

        if (r2 === r1 + 1 && c2 === c1) {
          // Vertical edge - check left and right
          blocks.push([
            [r1, c1],
            [r1, c1 + 1],
            [r2, c1],
            [r2, c1 + 1],
          ]);
          if (c1 > 0) {
            blocks.push([
              [r1, c1 - 1],
              [r1, c1],
              [r2, c1 - 1],
              [r2, c1],
            ]);
          }
        } else if (c2 === c1 + 1 && r2 === r1) {
          // Horizontal edge - check above and below
          blocks.push([
            [r1, c1],
            [r1, c2],
            [r1 + 1, c1],
            [r1 + 1, c2],
          ]);
          if (r1 > 0) {
            blocks.push([
              [r1 - 1, c1],
              [r1 - 1, c2],
              [r1, c1],
              [r1, c2],
            ]);
          }
        }

        // Check each block
        for (const block of blocks) {
          // All 4 cells must be in the same macro-area
          const allInArea = block.every(([r, c]) => cellSet.has(`${r},${c}`));
          if (!allInArea) continue;

          const [r, c] = block[0];

          // Check if all 4 cells are connected (no internal walls)
          const hasInternalWalls =
            horizontal[r][c] ||
            horizontal[r][c + 1] ||
            vertical[r][c] ||
            vertical[r + 1][c];

          if (!hasInternalWalls) {
            return true; // Found a 2x2 block without internal walls
          }
        }

        return false;
      }

      // Find areas based on current borders
      function findAreasFromBorders(grid, borders) {
        const rows = grid.length;
        const cols = grid[0].length;
        const visited = Array(rows)
          .fill(null)
          .map(() => Array(cols).fill(false));
        const areas = [];

        function floodFill(startRow, startCol) {
          const area = { cells: [], isBlack: grid[startRow][startCol] === 1 };
          const queue = [[startRow, startCol]];
          visited[startRow][startCol] = true;

          while (queue.length > 0) {
            const [row, col] = queue.shift();
            area.cells.push([row, col]);

            // Check all 4 directions
            const neighbors = [
              {
                nr: row - 1,
                nc: col,
                hasBorder: row > 0 && borders.horizontal[row - 1][col],
              },
              { nr: row + 1, nc: col, hasBorder: borders.horizontal[row][col] },
              {
                nr: row,
                nc: col - 1,
                hasBorder: col > 0 && borders.vertical[row][col - 1],
              },
              { nr: row, nc: col + 1, hasBorder: borders.vertical[row][col] },
            ];

            for (const { nr, nc, hasBorder } of neighbors) {
              if (
                nr >= 0 &&
                nr < rows &&
                nc >= 0 &&
                nc < cols &&
                !visited[nr][nc] &&
                !hasBorder
              ) {
                visited[nr][nc] = true;
                queue.push([nr, nc]);
              }
            }
          }

          return area;
        }

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            if (!visited[row][col]) {
              areas.push(floodFill(row, col));
            }
          }
        }

        return areas;
      }

      function findAreas(grid, borders) {
        return findAreasFromBorders(grid, borders);
      }

      function renderPuzzle(grid, borders, areas) {
        const canvas = document.getElementById('puzzleCanvas');
        const ctx = canvas.getContext('2d');
        const cellSize = 6;
        const rows = grid.length;
        const cols = grid[0].length;

        canvas.width = cols * cellSize;
        canvas.height = rows * cellSize;

        // Draw cells (light background)
        ctx.fillStyle = '#f8f5ed';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw borders
        ctx.strokeStyle = '#c0c0c0';
        ctx.lineWidth = 2;

        // Horizontal borders
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            if (borders.horizontal[row][col]) {
              ctx.beginPath();
              ctx.moveTo(col * cellSize, (row + 1) * cellSize);
              ctx.lineTo((col + 1) * cellSize, (row + 1) * cellSize);
              ctx.stroke();
            }
          }
        }

        // Vertical borders
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            if (borders.vertical[row][col]) {
              ctx.beginPath();
              ctx.moveTo((col + 1) * cellSize, row * cellSize);
              ctx.lineTo((col + 1) * cellSize, (row + 1) * cellSize);
              ctx.stroke();
            }
          }
        }

        // Draw dots in black areas - place at center of ONE cell FURTHEST from center
        ctx.fillStyle = '#1a1a1a';
        for (const area of areas) {
          if (area.isBlack && area.cells.length > 0) {
            // Find geometric center of the area
            const sumRow = area.cells.reduce((sum, [r, c]) => sum + r, 0);
            const sumCol = area.cells.reduce((sum, [r, c]) => sum + c, 0);
            const centerRow = sumRow / area.cells.length;
            const centerCol = sumCol / area.cells.length;

            // Find the cell FURTHEST from the geometric center
            let furthestCell = area.cells[0];
            let maxDist = 0;
            for (const [r, c] of area.cells) {
              const dist =
                Math.pow(r - centerRow, 2) + Math.pow(c - centerCol, 2);
              if (dist > maxDist) {
                maxDist = dist;
                furthestCell = [r, c];
              }
            }

            const [row, col] = furthestCell;
            const x = (col + 0.5) * cellSize;
            const y = (row + 0.5) * cellSize;

            ctx.beginPath();
            ctx.arc(x, y, cellSize * 0.3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      // Generate initial puzzle on load
      window.onload = () => {
        generatePuzzle();
      };
    </script>
  </body>
</html>
